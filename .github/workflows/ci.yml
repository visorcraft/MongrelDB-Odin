name: CI

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build & vet
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install libcurl (HTTP transport) and LLVM (Odin backend)
        # Odin's `build_odin.sh release` links against LLVM, which needs the
        # -dev packages (providing llvm-config + libLLVM) that the stock runner
        # image does not ship. Without them the compiler segfaults at build
        # time with `LLVM Error: No such file or directory`. Current Odin
        # (dev-2026-07) references LLVMFastMathFlags which was removed from
        # the LLVM C API in LLVM 18, so LLVM >= 18 is required. The runner is
        # ubuntu-24.04 (noble); pull LLVM 18 from the official apt.llvm.org
        # noble repository.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libcurl4-openssl-dev wget gnupg ca-certificates
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | \
            sudo gpg --dearmor -o /usr/share/keyrings/llvm-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/llvm-archive-keyring.gpg] http://apt.llvm.org/noble/ llvm-toolchain-noble-18 main" | \
            sudo tee /etc/apt/sources.list.d/llvm.list >/dev/null
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            llvm-18-dev clang-18 libpolly-18-dev

      - name: Install Odin
        env:
          # Point Odin's build script at the LLVM 18 toolchain we just installed.
          LLVM_CONFIG: /usr/lib/llvm-18/bin/llvm-config
        run: |
          git clone --depth 1 https://github.com/odin-lang/Odin.git /opt/odin
          (cd /opt/odin && ./build_odin.sh release)
          # The Odin binary links libLLVM-18.so with rpath=$ORIGIN; expose the
          # LLVM 18 lib dir to the dynamic loader, and put the LLVM 18 bin dir
          # (lld/opt/llc) plus Odin itself on PATH for every subsequent step.
          echo "LD_LIBRARY_PATH=/usr/lib/llvm-18/lib" >> "$GITHUB_ENV"
          echo "/usr/lib/llvm-18/bin" >> "$GITHUB_PATH"
          echo "/opt/odin" >> "$GITHUB_PATH"

      - name: Print Odin version
        run: odin version

      - name: Build library (warning-clean, vetted)
        # The library lives in the `mongreldb/` directory as `package mongreldb`.
        # `odin build mongreldb` compiles the whole package; `-vet` lints and
        # `-strict-style` keeps the style machine-checked.
        run: |
          odin build mongreldb -build-mode:lib \
            -out:build/lib_check -vet -strict-style

      - name: Build examples
        # Examples are single-file packages (`-file`) that import the library
        # via the `mdb` collection, which points at the repo root so the bare
        # `mongreldb` package directory resolves: `-collection:mdb=.`
        run: |
          mkdir -p build
          for ex in examples/*.odin; do
            name=$(basename "$ex" .odin)
            echo "=== Building $ex ==="
            odin build "$ex" -file -collection:mdb=. \
              -out:build/"$name" -vet -strict-style
          done

      - name: Run offline tests (wire-shape; live tests self-skip)
        # `odin test tests` discovers and runs every `@(test)` proc in the
        # `mongreldb_test` package. Without a daemon the live tests
        # short-circuit (return early), so only the pure wire-shape conformance
        # tests actually assert here.
        run: |
          odin test tests -collection:mdb=. -vet -strict-style \
            -define:ODIN_TEST_THREADS=4

  live:
    # Boots a real mongreldb-server and runs the full live round-trip suite.
    name: Live integration (against mongreldb-server)
    runs-on: ubuntu-latest
    env:
      SERVER_VERSION: '0.46.2'
      MONGRELDB_URL: http://127.0.0.1:8453
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install libcurl (HTTP transport) and LLVM (Odin backend)
        # Odin's `build_odin.sh release` links against LLVM, which needs the
        # -dev packages (providing llvm-config + libLLVM) that the stock runner
        # image does not ship. Without them the compiler segfaults at build
        # time with `LLVM Error: No such file or directory`. Current Odin
        # (dev-2026-07) references LLVMFastMathFlags which was removed from
        # the LLVM C API in LLVM 18, so LLVM >= 18 is required. The runner is
        # ubuntu-24.04 (noble); pull LLVM 18 from the official apt.llvm.org
        # noble repository.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libcurl4-openssl-dev wget gnupg ca-certificates
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | \
            sudo gpg --dearmor -o /usr/share/keyrings/llvm-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/llvm-archive-keyring.gpg] http://apt.llvm.org/noble/ llvm-toolchain-noble-18 main" | \
            sudo tee /etc/apt/sources.list.d/llvm.list >/dev/null
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            llvm-18-dev clang-18 libpolly-18-dev

      - name: Install Odin
        env:
          # Point Odin's build script at the LLVM 18 toolchain we just installed.
          LLVM_CONFIG: /usr/lib/llvm-18/bin/llvm-config
        run: |
          git clone --depth 1 https://github.com/odin-lang/Odin.git /opt/odin
          (cd /opt/odin && ./build_odin.sh release)
          # The Odin binary links libLLVM-18.so with rpath=$ORIGIN; expose the
          # LLVM 18 lib dir to the dynamic loader, and put the LLVM 18 bin dir
          # (lld/opt/llc) plus Odin itself on PATH for every subsequent step.
          echo "LD_LIBRARY_PATH=/usr/lib/llvm-18/lib" >> "$GITHUB_ENV"
          echo "/usr/lib/llvm-18/bin" >> "$GITHUB_PATH"
          echo "/opt/odin" >> "$GITHUB_PATH"

      - name: Print Odin version
        run: odin version

      - name: Build examples
        run: |
          mkdir -p build
          for ex in examples/*.odin; do
            name=$(basename "$ex" .odin)
            echo "=== Building $ex ==="
            odin build "$ex" -file -collection:mdb=. \
              -out:build/"$name" -vet -strict-style
          done

      - name: Cache mongreldb-server binary
        id: server-cache
        uses: actions/cache@v6
        with:
          path: bin/mongreldb-server
          key: mongreldb-server-linux-x64-${{ env.SERVER_VERSION }}

      - name: Download mongreldb-server
        if: steps.server-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p bin
          curl -fsSL -o bin/mongreldb-server \
            "https://github.com/visorcraft/MongrelDB/releases/download/v${SERVER_VERSION}/mongreldb-server-linux-x64"
          chmod +x bin/mongreldb-server
          ./bin/mongreldb-server --help | head -n 1

      - name: Start mongreldb-server
        run: |
          rm -rf /tmp/mongreldb-data
          ./bin/mongreldb-server /tmp/mongreldb-data --port 8453 > /tmp/mongreldb-server.log 2>&1 &
          echo $! > /tmp/mongreldb-server.pid
          # Wait for the daemon to become healthy (max ~30s).
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8453/health >/dev/null 2>&1; then
              echo "mongreldb-server is healthy"
              break
            fi
            sleep 1
          done
          curl -sf http://127.0.0.1:8453/health >/dev/null || (cat /tmp/mongreldb-server.log && exit 1)

      - name: Run live test suite
        run: |
          odin test tests -collection:mdb=. -vet -strict-style \
            -define:ODIN_TEST_THREADS=4

      - name: Run examples
        run: |
          ./build/basic_crud
          ./build/query_builder
          ./build/transactions

      - name: Dump server log on failure
        if: failure()
        run: cat /tmp/mongreldb-server.log

      - name: Stop mongreldb-server
        if: always()
        run: |
          if [ -f /tmp/mongreldb-server.pid ]; then
            kill "$(cat /tmp/mongreldb-server.pid)" 2>/dev/null || true
          fi
