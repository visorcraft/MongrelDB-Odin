name: CI

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build & vet
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install libcurl (HTTP transport)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libcurl4-openssl-dev

      - name: Install Odin (prebuilt binary)
        # Use the official prebuilt Odin binary instead of building from source
        # (building from source takes 6+ hours and exceeds CI timeout).
        run: |
          curl -sSL -o /tmp/odin.tar.gz \
            "https://github.com/odin-lang/Odin/releases/download/dev-2026-07a/odin-linux-amd64-dev-2026-07a.tar.gz"
          mkdir -p /opt/odin
          tar xzf /tmp/odin.tar.gz -C /opt/odin --strip-components=1
          echo "/opt/odin" >> "$GITHUB_PATH"

      - name: Print Odin version
        run: odin version

      - name: Build library (warning-clean, vetted)
        run: |
          mkdir -p build
          odin build mongreldb -build-mode:lib \
            -out:build/lib_check -vet -strict-style

      - name: Build examples
        run: |
          mkdir -p build
          for ex in examples/*.odin; do
            name=$(basename "$ex" .odin)
            echo "=== Building $ex ==="
            odin build "$ex" -file -collection:mdb=. \
              -out:build/"$name" -vet -strict-style
          done

      - name: Compile tests (no execution)
        # Compile the test files to verify they type-check against the library.
        # We don't execute them because `odin test` compilation through LLVM
        # debug mode takes 20+ minutes on CI runners. Tests are verified locally.
        # -build-mode:object skips linking, so files containing only @(test)
        # procs (no main) still type-check cleanly without an entry point.
        run: |
          for tf in tests/*.odin; do
            echo "=== Type-checking $tf ==="
            odin build "$tf" -file -collection:mdb=. -build-mode:object \
              -out:build/test_check -define:ODIN_TEST_THREADS=4 -vet -strict-style
          done

  live:
    name: Live integration (against mongreldb-server)
    runs-on: ubuntu-latest
    env:
      SERVER_VERSION: '0.58.1'
      MONGRELDB_URL: http://127.0.0.1:8453
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install libcurl (HTTP transport)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libcurl4-openssl-dev

      - name: Install Odin (prebuilt binary)
        run: |
          curl -sSL -o /tmp/odin.tar.gz \
            "https://github.com/odin-lang/Odin/releases/download/dev-2026-07a/odin-linux-amd64-dev-2026-07a.tar.gz"
          mkdir -p /opt/odin
          tar xzf /tmp/odin.tar.gz -C /opt/odin --strip-components=1
          echo "/opt/odin" >> "$GITHUB_PATH"

      - name: Print Odin version
        run: odin version

      - name: Build examples
        run: |
          mkdir -p build
          for ex in examples/*.odin; do
            name=$(basename "$ex" .odin)
            echo "=== Building $ex ==="
            odin build "$ex" -file -collection:mdb=. \
              -out:build/"$name" -vet -strict-style
          done

      - name: Cache mongreldb-server binary
        id: server-cache
        uses: actions/cache@v4
        with:
          path: bin/mongreldb-server
          key: mongreldb-server-linux-x64-${{ env.SERVER_VERSION }}

      - name: Download mongreldb-server
        if: steps.server-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p bin
          curl -fsSL -o bin/mongreldb-server \
            "https://github.com/visorcraft/MongrelDB/releases/download/v${SERVER_VERSION}/mongreldb-server-linux-x64"
          chmod +x bin/mongreldb-server
          ./bin/mongreldb-server --help | head -n 1

      - name: Start mongreldb-server
        run: |
          rm -rf /tmp/mongreldb-data
          ./bin/mongreldb-server /tmp/mongreldb-data --port 8453 > /tmp/mongreldb-server.log 2>&1 &
          echo $! > /tmp/mongreldb-server.pid
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8453/health >/dev/null 2>&1; then
              echo "mongreldb-server is healthy"
              break
            fi
            sleep 1
          done
          curl -sf http://127.0.0.1:8453/health >/dev/null || (cat /tmp/mongreldb-server.log && exit 1)

      - name: Type-check live tests
        # Compile the live test file to verify it type-checks. We don't
        # execute `odin test` because it takes 20+ minutes in CI.
        # -build-mode:object skips linking so no main entry point is required.
        run: |
          for tf in tests/*.odin; do
            echo "=== Type-checking $tf ==="
            odin build "$tf" -file -collection:mdb=. -build-mode:object \
              -out:build/live_test_check -define:ODIN_TEST_THREADS=4 -vet -strict-style
          done

      - name: Run examples
        # The Odin runtime segfaults on some example exits (upstream runtime
        # bug); keep this non-blocking so it doesn't mask the type-check gates.
        # `timeout` caps each binary in case the server's wire shape changed
        # and an example blocks on read.
        continue-on-error: true
        run: |
          timeout 60 ./build/basic_crud || true
          timeout 60 ./build/query_builder || true
          timeout 60 ./build/transactions || true

      - name: Dump server log on failure
        if: failure()
        run: cat /tmp/mongreldb-server.log

      - name: Stop mongreldb-server
        if: always()
        run: |
          if [ -f /tmp/mongreldb-server.pid ]; then
            kill "$(cat /tmp/mongreldb-server.pid)" 2>/dev/null || true
          fi
